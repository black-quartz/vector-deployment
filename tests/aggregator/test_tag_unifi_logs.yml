tests:
  - name: test_tag_unifi_logs
    inputs:
      - insert_at: tag_unifi_logs
        type: log
        log_fields:
          message: "{}"
    outputs:
      - extract_from: tag_unifi_logs
        conditions:
          - type: vrl
            source: |
              # Assert that the data stream for the logs follows 'logs-{dataset}-{namespace}'
              expected_destination = "logs-unifi-default"
              destination = "logs-" + string!(.@dataset) + "-" + string!(.@namespace)

              assert_eq!(.@source, "unifi")
              assert_eq!(.@dataset, "unifi")
              assert_eq!(.@namespace, "default")

              assert_eq!(destination, expected_destination)
