tests:
  - name: test_transform_hubble_flow_logs
    inputs:
      - insert_at: transform_hubble_flow_logs
        type: log
        log_fields:
          node_name: node-01
          flow:
            emitter:
              name: Hubble
              version: test-version
            ethernet:
              source: aa:aa:aa:aa:aa:aa
              destination: bb:bb:bb:bb:bb:bb
            IP:
              source: "1.1.1.1"
              destination: "8.8.8.8"
              ipVersion: IPv4
            l4:
              TCP:
                source_port: 47100
                destination_port: 53
            source:
              ID: 21
              identity: 12345
              cluster_name: test
              namespace: test-namespace-alpha
              labels: []
              pod_name: test-pod-1
              workloads: []
            destination:
              ID: 9001
              identity: 22222
              cluster_name: test
              namespace: test-namespace-delta
              labels: []
              pod_name: test-pod-2
              workloads: []
            Type: L3_L4
            node_name: node-01
            event_type:
              type: "4"
            interface:
              index: 20
              name: test
            Summary: UDP
    outputs:
      - extract_from: transform_hubble_flow_logs
        conditions:
          - type: vrl
            source: |
              assert_eq!(.destination.id, 9001)
              assert_eq!(.destination.ip, "8.8.8.8")
              assert_eq!(.destination.pod, "test-pod-2")
              assert_eq!(.destination.port, 53)

              assert_eq!(.event_type, "4")
              assert_eq!(.node, "node-01")
              assert_eq!(.summary, "UDP")

              assert_eq!(.source.id, 21)
              assert_eq!(.source.ip, "1.1.1.1")
              assert_eq!(.source.pod, "test-pod-1")
              assert_eq!(.source.port, 47100)

              assert_eq!(.type, "L3_L4")

              assert!(exists(.flow) == false)
              assert!(exists(.emitter) == false)
              assert!(exists(.ethernet) == false)
              assert!(exists(.interface) == false)
              assert!(exists(.l4) == false)
