tests:
  - name: test_transform_envoy_access_logs
    inputs:
      - insert_at: transform_envoy_access_logs
        type: log
        log_fields:
          "@dataset": "kubernetes.envoy"
    outputs:
      - extract_from: transform_envoy_access_logs
        conditions:
          - type: vrl
            source: |
              assert_eq!(.@dataset, "envoy.access")
