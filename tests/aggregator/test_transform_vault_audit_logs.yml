tests:
  - name: test_transform_vault_audit_logs
    inputs:
      - insert_at: transform_vault_audit_logs
        type: log
        log_fields:
          "@dataset": "vault.audit"
    outputs:
      - extract_from: transform_vault_audit_logs
        conditions:
          - type: vrl
            source: |
              assert_eq!(.@dataset, "vault.audit")
