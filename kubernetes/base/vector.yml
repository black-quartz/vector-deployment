apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: vector
  namespace: vector
spec:
  interval: 5m
  url: https://helm.vector.dev
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vector-agent
  namespace: vector
spec:
  serviceAccountName: flux
  targetNamespace: vector
  interval: 30m
  chart:
    spec:
      chart: vector
      version: "0.51.x"
      sourceRef:
        kind: HelmRepository
        name: vector
      interval: 12h
  releaseName: vector-agent
  # https://github.com/vectordotdev/helm-charts/blob/develop/charts/vector/values.yaml
  values:
    role: "Agent"
    dataDir: /vector-data-dir
    existingConfigMaps:
      - vector-agent-base

    service:
      enabled: false

    serviceAccount:
      create: true
      name: vector-agent

    rbac:
      create: false

    extraVolumes:
      - name: vector-agent-sources
        configMap:
          name: vector-agent-sources

      - name: vector-agent-transforms
        configMap:
          name: vector-agent-transforms

      - name: vector-agent-sinks
        configMap:
          name: vector-agent-transforms

      - name: ilysium-root-ca
        configMap:
          name: ilysium-root-ca

      - name: vector-agent-tls
        secret:
          secretName: vector-agent-tls-secret

      - name: hubble-logs
        hostPath:
          path: /var/run/cilium/hubble
          type: DirectoryOrCreate

    extraVolumeMounts:
      - name: vector-agent-sources
        mountPath: /etc/vector/sources
        readOnly: true

      - name: vector-agent-transforms
        mountPath: /etc/vector/transforms
        readOnly: true

      - name: vector-agent-sinks
        mountPath: /etc/vector/sinks
        readOnly: true

      - name: ilysium-root-ca
        mountPath: /etc/ssl/ilysium
        readOnly: true

      - name: vector-agent-tls
        mountPath: /etc/ssl/vector
        readOnly: true

      - name: hubble-logs
        mountPath: /var/run/cilium/hubble
        readOnly: true

    workloadResourceAnnotations:
      reloader.stakater.com/auto: "true"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vector-aggregator
  namespace: vector
spec:
  serviceAccountName: flux
  targetNamespace: vector
  interval: 30m
  chart:
    spec:
      chart: vector
      version: "0.51.x"
      sourceRef:
        kind: HelmRepository
        name: vector
      interval: 12h
  releaseName: vector-aggregator
  # https://github.com/vectordotdev/helm-charts/blob/develop/charts/vector/values.yaml
  values:
    role: "Stateless-Aggregator"
    dataDir: /vector-data-dir
    existingConfigMaps:
      - vector-aggregator-base

    # autoscaling:
    #   enabled: false
    #   minReplicas: 1
    #   maxReplicas: 10

    service:
      enabled: true
      type: "ClusterIP"

      ports:
        - name: syslog-udp
          port: 514
          protocol: UDP
          targetPort: 514

        - name: vector-grpc
          port: 8585
          protocol: TCP
          targetPort: 8585

    serviceAccount:
      create: true
      name: vector-aggregator

    rbac:
      create: false

    extraVolumes:
      - name: vector-aggregator-sources
        configMap:
          name: vector-aggregator-sources

      - name: vector-aggregator-transforms
        configMap:
          name: vector-aggregator-transforms

      - name: vector-aggregator-sinks
        configMap:
          name: vector-aggregator-sinks

      - name: elastic-ca
        configMap:
          name: elastic-ca

      - name: ilysium-root-ca
        configMap:
          name: ilysium-root-ca

      - name: vector-aggregator-tls
        secret:
          secretName: vector-aggregator-tls-secret

    extraVolumeMounts:
      - name: vector-aggregator-sources
        mountPath: /etc/vector/sources
        readOnly: true

      - name: vector-aggregator-transforms
        mountPath: /etc/vector/transforms
        readOnly: true

      - name: vector-aggregator-sinks
        mountPath: /etc/vector/sinks
        readOnly: true

      - name: elastic-ca
        mountPath: /etc/ssl/elastic
        readOnly: true

      - name: ilysium-root-ca
        mountPath: /etc/ssl/ilysium
        readOnly: true

      - name: vector-aggregator-tls
        mountPath: /etc/ssl/vector
        readOnly: true

    env:
      - name: ELASTIC_USERNAME
        valueFrom:
          secretKeyRef:
            name: vector-elastic-credentials
            key: username
      - name: ELASTIC_PASSWORD
        valueFrom:
          secretKeyRef:
            name: vector-elastic-credentials
            key: password

    workloadResourceAnnotations:
      reloader.stakater.com/auto: "true"
