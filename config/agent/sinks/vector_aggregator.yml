sinks:
  vector_aggregator:
    type: vector
    inputs:
      - tag_hubble_flow_logs
      - tag_kubernetes_logs
      - tag_kubernetes_audit_logs
    address: vector-aggregator.vector.svc:8585
    tls:
      enabled: true
      ca_file: /etc/ssl/ilysium/ca.crt
      crt_file: /etc/ssl/vector/tls.crt
      key_file: /etc/ssl/vector/tls.key
      verify_certificate: true
      verify_hostname: true
    healthcheck:
      enabled: true
